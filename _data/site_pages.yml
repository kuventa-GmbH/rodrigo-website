leistungen:
  hero:
    kicker: "Beratung und Implementierung"
    title: "Leistungen für moderne Identity-Infrastrukturen"
    text: "kuventa unterstützt Unternehmen von der Analyse bis zur Umsetzung. Alle Leistungen sind auf die Modernisierung bestehender On-Premise-Landschaften und die Vorbereitung auf cloudfähige Architekturen ausgerichtet."
    image: "/assets/img/illustrations/home/grow.svg"
    image_alt: "Illustration zu Leistungen für Identity-Infrastrukturen"
  sections:
    - template: "cards"
      heading: "Unsere Leistungen"
      intro: "Die Leistungen bauen aufeinander auf und können je nach Ausgangslage als Assessment, Architekturprojekt oder Implementierung starten."
      items:
        - title: "Identity Modernisierung"
          text: "Zielbild und Modernisierungsstrategie für hybride und cloudfähige Identity-Architekturen."
          icon: "/assets/img/icons/bulb.svg"
          points:
            - "Zentrale Authentifizierung statt Login-Inseln"
            - "Schrittweise Modernisierung historisch gewachsener Landschaften"
            - "Vorbereitung auf Cloud- und API-Architekturen"
          link: "/identity-modernisierung/"
          link_text: "Mehr erfahren"
          link_as_button: true
        - title: "Identity Assessment"
          text: "Strukturierte Analyse der aktuellen Authentifizierungslandschaft mit Roadmap für die nächsten Entscheidungen."
          icon: "/assets/img/icons/search.svg"
          points:
            - "Ist-Zustand transparent machen"
            - "Sicherheits- und Integrationsrisiken bewerten"
            - "Priorisierte Roadmap ableiten"
          link: "/identity-assessment/"
          link_text: "Mehr erfahren"
          link_as_button: true
        - title: "SSO Plattform"
          text: "Zentrale Authentifizierungsplattform für interne Anwendungen, Portale, SaaS und APIs."
          icon: "/assets/img/icons/cap.svg"
          points:
            - "Single Sign-On für interne Nutzer"
            - "Anbindung von AD, LDAP und SaaS"
            - "Konsistente MFA und zentrale Policies"
          link: "/sso-plattform/"
          link_text: "Mehr erfahren"
          link_as_button: true
        - title: "Customer Identity Plattform"
          text: "Login-Plattform für Kunden-, Partner- und Entwicklerportale mit standardisierter Sicherheit."
          icon: "/assets/img/icons/creative.svg"
          points:
            - "Self-Service und Registrierungsprozesse"
            - "Tokenbasierte Sicherheit für Anwendungen und APIs"
            - "Skalierbare externe Identitäten"
          link: "/customer-identity-plattform/"
          link_text: "Mehr erfahren"
          link_as_button: true
    - template: "focus"
      alt: true
      heading: "Wann welche Leistung passt"
      text: "Nicht jedes Vorhaben startet am selben Punkt. Entscheidend ist, ob zuerst Transparenz fehlt oder bereits eine konkrete Zielplattform aufgebaut werden soll."
      image: "/assets/img/illustrations/about/user.svg"
      columns:
        - title: "Assessment"
          text: "Wenn die bestehende Landschaft bewertet und priorisiert werden muss."
          points:
            - "Ist-Analyse und Handlungsfelder"
            - "Roadmap für Folgeprojekte"
            - "Belastbare Entscheidungsgrundlage"
        - title: "SSO für interne Systeme"
          text: "Wenn Mitarbeitende, interne Portale und Unternehmensanwendungen zentral authentifiziert werden sollen."
          points:
            - "Single Sign-On"
            - "MFA"
            - "Zentrale Policies"
        - title: "Customer Identity"
          text: "Wenn externe Nutzer sicher und standardisiert auf Portale oder APIs zugreifen müssen."
          points:
            - "Externe Identitäten"
            - "Self-Service"
            - "API-Sicherheit"
    - template: "steps"
      heading: "Typischer Einstieg"
      text: "Viele Mandate beginnen mit einer klaren Einordnung der Ausgangslage und werden dann in einen überschaubaren ersten Scope überführt."
      steps:
        - title: "Ausgangslage aufnehmen"
          text: "Wir erfassen Systeme, Nutzergruppen, Integrationen und aktuelle Engpässe."
        - title: "Zielbild definieren"
          text: "Wir strukturieren die passende Identity-Architektur für Ihre IT-Landschaft."
        - title: "Scope priorisieren"
          text: "Der erste Umsetzungsumfang wird nach Nutzen, Risiko und Machbarkeit zugeschnitten."
        - title: "Schrittweise einführen"
          text: "Integration, Betriebsmodell und Wissenstransfer werden von Anfang an mitgedacht."
    - template: "cards"
      alt: true
      heading: "Business-Nutzen"
      intro: "Die Leistungen sind darauf ausgerichtet, Betrieb zu entlasten, Sicherheit zu verbessern und Architekturentscheidungen zu vereinfachen."
      items:
        - title: "Weniger Login-Inseln"
          text: "Zentrale Authentifizierung reduziert Medienbrüche und Supportaufwand."
          icon: "/assets/img/icons/circle.svg"
        - title: "Mehr Sicherheitskontrolle"
          text: "MFA, Policies und Authentifizierungsflüsse werden konsistent steuerbar."
          icon: "/assets/img/icons/star.svg"
        - title: "Bessere Integrationsfähigkeit"
          text: "Neue Anwendungen, SaaS und APIs lassen sich standardisiert anbinden."
          icon: "/assets/img/icons/train.svg"
        - title: "Belastbare Zielarchitektur"
          text: "Identity wird zu einem Architekturbaustein für weitere Cloud- und Plattforminitiativen."
          icon: "/assets/img/icons/search.svg"
  final_cta:
    image: "/assets/img/illustrations/home/userlaptop.svg"
    icon: "/assets/img/icons/handshake.png"
    title: "Passenden Einstieg für Ihr Vorhaben klären"
    text: "Im Erstgespräch klären wir, ob Assessment, Modernisierung, SSO Plattform oder Customer Identity der richtige Einstieg ist."
    show_note_below: true

loesungen:
  hero:
    kicker: "Typische Kundenprobleme"
    title: "Lösungen für gewachsene Identity-Landschaften"
    text: "Viele Unternehmen haben keine isolierte IAM-Aufgabe, sondern eine historisch gewachsene Authentifizierungslandschaft. kuventa strukturiert daraus ein belastbares Zielbild für moderne, cloudfähige Identity-Architekturen."
    image: "/assets/img/illustrations/home/security.svg"
    image_alt: "Illustration zu Lösungen für Identity-Landschaften"
  sections:
    - template: "cards"
      heading: "Typische Ausgangslagen"
      intro: "Diese Situationen sind häufig der Auslöser für ein Identity-Modernisierungsvorhaben."
      items:
        - title: "Mehrere Logins"
          text: "Anwendungen verwalten ihre Anmeldungen separat, was Nutzer und Betrieb belastet."
          icon: "/assets/img/icons/circle.svg"
        - title: "AD funktioniert, Cloud-Anbindung nicht"
          text: "Die bestehende Benutzerquelle ist etabliert, reicht für moderne SaaS- und API-Szenarien aber nicht aus."
          icon: "/assets/img/icons/cap.svg"
        - title: "Uneinheitliche MFA"
          text: "Mehrfaktor-Authentifizierung ist nur teilweise eingeführt oder pro Anwendung unterschiedlich umgesetzt."
          icon: "/assets/img/icons/star.svg"
        - title: "Fehlende Transparenz"
          text: "Trust-Beziehungen, Login-Flows und Zuständigkeiten sind über viele Systeme verteilt."
          icon: "/assets/img/icons/search.svg"
        - title: "Neue Portale und APIs"
          text: "Fachbereiche oder Produkte benötigen moderne Authentifizierungsstandards für interne und externe Nutzer."
          icon: "/assets/img/icons/creative.svg"
        - title: "Cloud-Transformation"
          text: "Die IT-Landschaft entwickelt sich Richtung Cloud, die Identity-Architektur bleibt aber auf On-Premise-Muster festgelegt."
          icon: "/assets/img/icons/train.svg"
    - template: "process"
      alt: true
      heading: "Was moderne Identity leisten muss"
      text: "Eine moderne Identity-Infrastruktur muss Sicherheit, Integrationsfähigkeit und Betriebsrealität gleichzeitig abdecken."
      subheading: "Worauf es ankommt"
      image: "/assets/img/illustrations/home/path.svg"
      points:
        - "zentraler Identity Provider statt verteilter Login-Mechanismen"
        - "Standards wie OpenID Connect, OAuth2 und SAML"
        - "konsistente MFA und zentrale Zugriffskontrolle"
        - "saubere Integration von On-Premise, SaaS, Portalen und APIs"
      note: "Das Ziel ist keine isolierte Tool-Einführung, sondern eine belastbare Plattform für weitere Architekturentscheidungen."
    - template: "cards"
      heading: "Passende Lösungsansätze"
      intro: "Je nach Ausgangslage beginnt die Lösung mit Analyse, interner Plattform oder externer Identity."
      items:
        - title: "Identity Modernisierung"
          text: "Für Unternehmen, die ihre Authentifizierungslandschaft strategisch und technisch neu ausrichten wollen."
          icon: "/assets/img/icons/bulb.svg"
          link: "/identity-modernisierung/"
          link_text: "Mehr erfahren"
          link_as_button: true
        - title: "Identity Assessment"
          text: "Für Vorhaben, die zuerst Transparenz und eine priorisierte Roadmap benötigen."
          icon: "/assets/img/icons/search.svg"
          link: "/identity-assessment/"
          link_text: "Mehr erfahren"
          link_as_button: true
        - title: "SSO Plattform"
          text: "Für interne Anwendungen, Mitarbeiterzugänge und hybride Unternehmensumgebungen."
          icon: "/assets/img/icons/cap.svg"
          link: "/sso-plattform/"
          link_text: "Mehr erfahren"
          link_as_button: true
        - title: "Customer Identity Plattform"
          text: "Für Kunden-, Partner- und Entwicklerportale mit standardisierter Sicherheit."
          icon: "/assets/img/icons/creative.svg"
          link: "/customer-identity-plattform/"
          link_text: "Mehr erfahren"
          link_as_button: true
    - template: "focus"
      alt: true
      heading: "Ergebnis einer sauberen Identity-Architektur"
      text: "Wenn Identity als Plattform aufgebaut wird, verbessert sich nicht nur der Login-Prozess, sondern die gesamte Integrationsfähigkeit der IT-Landschaft."
      image: "/assets/img/illustrations/home/config.svg"
      columns:
        - title: "Betrieb"
          points:
            - "weniger Supportaufwand"
            - "weniger Passwort- und Login-Probleme"
            - "klarere Zuständigkeiten"
        - title: "Sicherheit"
          points:
            - "konsistente MFA"
            - "zentrale Policies"
            - "bessere Nachvollziehbarkeit"
        - title: "Cloud Readiness"
          points:
            - "schnellere Anbindung neuer Anwendungen"
            - "tokenbasierte API-Sicherheit"
            - "tragfähige Zielarchitektur für weitere Modernisierung"
  final_cta:
    image: "/assets/img/illustrations/home/process.svg"
    icon: "/assets/img/icons/handshake.png"
    title: "Ausgangslage einordnen und Lösungsweg festlegen"
    text: "Im Erstgespräch strukturieren wir, welche Probleme heute die größte Reibung erzeugen und welcher Einstieg sinnvoll ist."
    show_note_below: true

ueber-uns:
  hero:
    kicker: "Spezialisiertes Consulting-Unternehmen"
    title: "kuventa modernisiert Identity-Infrastrukturen"
    text: "kuventa ist auf Identity Modernisierung für mittelständische Unternehmen spezialisiert. Wir unterstützen bei der zentralen Authentifizierung, der Einführung moderner Standards und der Vorbereitung bestehender IT-Landschaften auf Cloud- und API-Architekturen."
    image: "/assets/img/photos/about/hero.webp"
    image_alt: "Hero-Bild von kuventa"
  sections:
    - template: "focus"
      heading: "Unsere Positionierung"
      text: "Der Fokus liegt nicht auf einem isolierten Keycloak-Setup, sondern auf einer belastbaren Identity-Architektur für reale Unternehmenslandschaften."
      paragraph_links:
        - prefix: "Die technische Führung wird durch den "
          link_text: "Gründer und Lead Identity Consultant"
          link: "/beraterprofil/"
          suffix: " eingebracht."
      image: "/assets/img/illustrations/about/user.svg"
      columns:
        - title: "Spezialisierung"
          points:
            - "Keycloak als zentrale Identity Plattform"
            - "Single Sign-On, MFA und zentrale Authentifizierung"
            - "API-Sicherheit und moderne Login-Standards"
        - title: "Projektfokus"
          points:
            - "Modernisierung bestehender On-Premise-Landschaften"
            - "hybride Zielarchitekturen für Cloud-Vorbereitung"
            - "Integration von Verzeichnisdiensten, Portalen und APIs"
        - title: "Leistungsbild"
          points:
            - "Assessment und Bestandsanalyse"
            - "Architektur, Konzept und Priorisierung"
            - "Implementierung und technische Begleitung"
    - template: "process"
      alt: true
      heading: "Wie wir arbeiten"
      text: "Identity-Projekte werden technisch sauber strukturiert und gleichzeitig nah an Betrieb, Umsetzbarkeit und tatsächlicher Systemlandschaft gehalten."
      subheading: "Projektansatz"
      image: "/assets/img/illustrations/home/grow.svg"
      points:
        - "Ausgangslage, Abhängigkeiten und Integrationen aufnehmen"
        - "Zielarchitektur auf Standards wie OpenID Connect, OAuth2 und SAML ausrichten"
        - "bestehende Systeme schrittweise integrieren statt abrupt ersetzen"
        - "Betrieb, Administration und Governance früh mitdenken"
      note: "So entstehen Lösungen, die fachlich verständlich und technisch belastbar bleiben."
    - template: "cards"
      heading: "Typische Kundenkontexte"
      intro: "Die Website richtet sich an technische Entscheider in mittelständischen Unternehmen mit gewachsenen IT-Landschaften."
      items:
        - title: "Unternehmensgröße"
          text: "Typischerweise 50 bis 2000 Mitarbeitende mit eigener IT-Organisation und mehreren geschäftskritischen Anwendungen."
          icon: "/assets/img/icons/circle.svg"
        - title: "Branchen"
          text: "Maschinenbau, Industrie, Logistik, Softwareunternehmen und Energieunternehmen."
          icon: "/assets/img/icons/cap.svg"
        - title: "Rollen"
          text: "CIO, IT-Leiter, Head of Infrastructure, Security-Verantwortliche und Enterprise-Architekten."
          icon: "/assets/img/icons/search.svg"
        - title: "Projektanlässe"
          text: "Cloud-Vorbereitung, MFA-Einführung, SSO-Aufbau, API-Sicherheit oder Modernisierung einer gewachsenen Login-Landschaft."
          icon: "/assets/img/icons/train.svg"
    - template: "cards"
      alt: true
      heading: "Warum das für Enterprise-Kunden relevant ist"
      intro: "Vertrauen entsteht dort, wo technisches Verständnis, Umsetzungsfähigkeit und klare Priorisierung zusammenkommen."
      items:
        - title: "Enterprise-Erfahrung"
          text: "Erfahrung aus komplexen Umgebungen mit heterogenen Systemen, Sicherheitsanforderungen und vielen Integrationspunkten."
          icon: "/assets/img/icons/star.svg"
        - title: "Modernisierungsfokus"
          text: "Der Schwerpunkt liegt auf realistischen Migrationspfaden statt auf theoretischen Zielbildern ohne Anschluss an den Betrieb."
          icon: "/assets/img/icons/bulb.svg"
        - title: "Technische Umsetzungsnähe"
          text: "Architekturentscheidungen werden so vorbereitet, dass sie bis in Konfiguration, Integration und Einführung tragfähig bleiben."
          icon: "/assets/img/icons/creative.svg"
  final_cta:
    image: "/assets/img/photos/about/dennis.webp"
    icon: "/assets/img/icons/handshake.png"
    title: "Identity-Modernisierung mit technischer Führung aufsetzen"
    text: "Im Erstgespräch besprechen wir, welche Ausgangslage Ihre IT-Landschaft mitbringt und wie ein realistischer Einstieg aussieht."
    show_note_below: true

beraterprofil:
  hero:
    kicker: "Technische Führung"
    title: "Gründer & Lead Identity Consultant"
    text: "Dennis Kürschner begleitet Identity-Projekte mit Fokus auf Architektur, Integration und technische Umsetzung. Der Schwerpunkt liegt auf modernen Identity-Plattformen mit Keycloak in hybriden und cloudnahen Unternehmensumgebungen."
    image: "/assets/img/photos/about/dennis.webp"
    image_alt: "Dennis Kürschner"
  sections:
    - template: "focus"
      heading: "Fachlicher Fokus"
      text: "Das Beraterprofil dient nicht als Freelancer-CV, sondern als Nachweis technischer Führung für anspruchsvolle Identity-Vorhaben."
      image: "/assets/img/illustrations/about/security.svg"
      columns:
        - title: "Identity Architektur"
          points:
            - "zentraler Identity Provider"
            - "Single Sign-On und Federation"
            - "MFA und hybride Zielarchitekturen"
        - title: "Integrationen"
          points:
            - "Active Directory und LDAP"
            - "SaaS-Anwendungen und interne Portale"
            - "APIs und Service-to-Service-Flows"
        - title: "Projektarbeit"
          points:
            - "Assessment und Discovery Workshops"
            - "Architekturentscheidungen und Integrationskonzepte"
            - "technische Begleitung bis in die Umsetzung"
    - template: "cards"
      alt: true
      heading: "Erfahrung aus komplexen Umgebungen"
      intro: "Die Arbeitsschwerpunkte liegen in Unternehmensumgebungen, in denen Security, Integrationen und Betriebsrealität eng zusammenspielen."
      items:
        - title: "Versicherungen und regulierte Umfelder"
          text: "Erfahrung mit sicherheitskritischen Anforderungen, klaren Kontrollen und belastbaren Betriebsprozessen."
          icon: "/assets/img/icons/star.svg"
        - title: "Handel und Enterprise IT"
          text: "Arbeit in großen IT-Landschaften mit vielen Anwendungen, Nutzergruppen und Integrationsbeziehungen."
          icon: "/assets/img/icons/circle.svg"
        - title: "Industrie und Systemintegration"
          text: "Modernisierung gewachsener Systemlandschaften mit pragmatischen Schritten und technischem Fokus."
          icon: "/assets/img/icons/cap.svg"
        - title: "Software- und Plattformprojekte"
          text: "Verständnis für Portale, APIs, Entwickleranforderungen und produktnahe Identity-Szenarien."
          icon: "/assets/img/icons/creative.svg"
    - template: "steps"
      heading: "Rolle im Projekt"
      text: "Technische Führung bedeutet, Architekturentscheidungen mit Umsetzbarkeit und Betrieb zusammenzubringen."
      steps:
        - title: "Ausgangslage strukturieren"
          text: "Systeme, Authentifizierungswege, Integrationen und Risiken werden sauber eingeordnet."
        - title: "Zielarchitektur definieren"
          text: "Die zukünftige Identity-Plattform wird auf Standards, Betriebsmodell und Migrationspfad ausgerichtet."
        - title: "Umsetzung begleiten"
          text: "Konfiguration, Integrationen und technische Entscheidungen werden bis in die Einführung begleitet."
        - title: "Wissen übertragen"
          text: "Administrations- und Betriebswissen wird so aufgebaut, dass die Plattform intern tragfähig bleibt."
    - template: "cards"
      alt: true
      heading: "Worauf der Fokus im Projekt liegt"
      intro: "Entscheidend sind technische Klarheit, Standardisierung und eine Architektur, die im Betrieb Bestand hat."
      items:
        - title: "Standards vor Sonderlogik"
          text: "OIDC, OAuth2 und SAML bilden die Grundlage für eine nachhaltige Integration."
          icon: "/assets/img/icons/search.svg"
        - title: "Betriebsfähigkeit"
          text: "Monitoring, Administration, Rollen und Zuständigkeiten werden nicht nachgelagert behandelt."
          icon: "/assets/img/icons/train.svg"
        - title: "Schrittweise Migration"
          text: "Bestehende Systeme werden integriert und kontrolliert modernisiert statt unkoordiniert ersetzt."
          icon: "/assets/img/icons/bulb.svg"
        - title: "Klare technische Entscheidungen"
          text: "Jede Entscheidung muss Architektur, Sicherheit und Umsetzbarkeit gleichzeitig tragen."
          icon: "/assets/img/icons/circle.svg"
  final_cta:
    image: "/assets/img/photos/about/hero.webp"
    icon: "/assets/img/icons/handshake.png"
    title: "Direkt mit dem Lead Identity Consultant sprechen"
    text: "Im Erstgespräch besprechen wir Ihre aktuelle Identity-Landschaft, mögliche Zielbilder und einen sinnvollen ersten Scope."
    show_note_below: true
