      link: "/customer-identity-plattform/"
      link_text: "Leistung ansehen"

process:
  heading: "Typische Ausgangslagen"
  text: "Viele Vorhaben starten nicht auf der grünen Wiese, sondern mit gewachsenen Verzeichnisdiensten, Legacy-Anwendungen und zunehmendem Cloud-Druck."
  sub-heading: "Wann wir typischerweise hinzugezogen werden"
  sub-text1:
    - "Mehrere Logins, verteilt gepflegte Benutzerkonten und fehlende Transparenz"
    - "Geplante SaaS- oder Cloud-Integrationen ohne passende Identity-Architektur"
    - "Uneinheitliche MFA und steigende Anforderungen aus Security und Audit"
    - "Neue Portale oder APIs, die moderne Authentifizierungsstandards benötigen"
  sub-text2: "Ziel ist eine zentrale Identity-Plattform, die Betrieb vereinfacht und künftige Architekturentscheidungen unterstützt."
  image: "/assets/img/illustrations/home/path.svg"
  primary_btn: "Jetzt Termin buchen"
  primary_btn_link: "/kontakt/"
  primary_note: "Kostenloses Erstgespräch • 30 Minuten • unverbindlich"

