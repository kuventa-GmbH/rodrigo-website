        - "Verständnis für regulierte und sicherheitskritische Umgebungen"
        - "Arbeit mit Fachbereichen, Infrastruktur und Security"
      text: "kuventa begleitet Identity-Vorhaben in Unternehmen mit gewachsenen Systemlandschaften, kritischen Anwendungen und hohem Integrationsbedarf."
