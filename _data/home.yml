      link_text: "Leistung ansehen"
    - title: "Identity Assessment"
      points:
        - "Analyse der bestehenden Identity- und Authentifizierungslandschaft"
        - "Bewertung von SSO, MFA, Integrationen und Sicherheitsniveau"
