hero:
  kicker: "Spezialisiertes Consulting für den Mittelstand"
  title: "Identity Modernisierung für cloudfähige IT-Landschaften"
  text: "kuventa plant und implementiert zentrale Identity-Plattformen auf Basis von Keycloak. Wir modernisieren gewachsene On-Premise-Umgebungen, führen Single Sign-On und Multi-Faktor-Authentifizierung ein und schaffen eine tragfähige Grundlage für Cloud-Services, Portale und APIs."
  image: "/assets/img/illustrations/home/path.svg"
  image_alt: "Illustration einer modernen Identity-Architektur"

why:
  image: "/assets/img/icons/thumb.svg"
  heading: "Warum Unternehmen mit kuventa arbeiten"
  items:
    - title: "Identity als Plattform"
      text: "Wir betrachten Authentifizierung nicht als Einzellösung, sondern als zentrale Plattform für interne Anwendungen, APIs, Portale und künftige Cloud-Services."
      icon: "/assets/img/icons/bulb.svg"
    - title: "Keycloak mit Architekturblick"
      text: "Der Schwerpunkt liegt auf modernen Identity-Architekturen mit Keycloak, OpenID Connect, OAuth2 und SAML für hybride Unternehmenslandschaften."
      icon: "/assets/img/icons/cap.svg"
    - title: "Modernisierung statt Big Bang"
      text: "Bestehende Verzeichnisdienste, Legacy-Anwendungen und neue Cloud-Dienste werden schrittweise in ein belastbares Zielbild überführt."
      icon: "/assets/img/icons/creative.svg"
    - title: "Beratung und Umsetzung"
      text: "Von Assessment und Zielarchitektur bis zur Implementierung begleiten wir Vorhaben technisch und pragmatisch."
      icon: "/assets/img/icons/circle.svg"

