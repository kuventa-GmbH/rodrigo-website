home:
  hero:
    kicker: "Persönlich, sauber und zuverlässig"
    title: "Handwerksarbeiten rund ums Haus in Rösrath und Umgebung"
    text: "Bodenverlegung, Renovierungen, Badsanierung und Arbeiten im Außenbereich - zuverlässig und sauber umgesetzt."
    badges:
      - icon: "user-round"
        label: "Persönlicher Ansprechpartner"
      - icon: "sparkles"
        label: "Saubere Ausführung"
      - icon: "map-pin"
        label: "Rösrath plus ca. 50 km"
  intro:
    heading: "Persönlich vor Ort"
    text: "Ich begleite Projekte rund ums Haus persönlich - von der ersten Absprache bis zur sauberen Umsetzung. Wichtig sind mir klare Kommunikation, ordentliche Arbeit und ein fairer Umgang mit Budget und Zeit."
    highlights:
      - icon: "user-round"
        title: "Persönlicher Ansprechpartner"
        text: "Sie sprechen direkt mit demjenigen, der Ihr Projekt begleitet."
      - icon: "sparkles"
        title: "Saubere Arbeit"
        text: "Ordentliche Ausführung und ein aufgeräumter Abschluss gehören dazu."
      - icon: "wallet"
        title: "Faire Preise"
        text: "Leistungen werden verständlich besprochen und transparent angeboten."
      - icon: "map-pin"
        title: "Regional unterwegs"
        text: "Projekte in Rösrath und im Umkreis von rund 50 km."
  reasons:
    heading: "Warum Kunden mich wählen"
    items:
      - icon: "badge-check"
        title: "Zuverlässige Umsetzung"
        text: "Absprachen werden eingehalten und Arbeiten sauber vorbereitet."
      - icon: "message-square"
        title: "Persönliche Beratung"
        text: "Ich erkläre klar, was sinnvoll ist und was nicht."
      - icon: "shield-check"
        title: "Saubere Arbeit"
        text: "Sorgfalt, Ordnung und ein vernünftiger Abschluss sind selbstverständlich."
      - icon: "map-pin"
        title: "Regionale Projekte"
        text: "Kurze Wege und schnelle Abstimmung rund um Rösrath."
  cta:
    title: "Sie planen ein Projekt?"
    text: "Schicken Sie einfach kurz eine Nachricht oder rufen Sie an. Ich melde mich zeitnah zurück."
    actions_key: "quick-contact"

pages:
  leistungen:
    kicker: "Leistungen"
    title: "Leistungen rund ums Haus"
    text: "Ob einzelne Renovierungsarbeiten oder größere Vorhaben: Ich unterstütze Sie bei Innenarbeiten, Badprojekten und Arbeiten im Außenbereich."
    badges:
      - icon: "hammer"
        label: "Innen und außen"
      - icon: "bath"
        label: "Bad und Planung"
      - icon: "map-pin"
        label: "Rösrath und Umgebung"
  galerie:
    kicker: "Galerie"
    title: "Einblicke in meine Projekte"
    text: "Hier sehen Sie eine kleine Auswahl meiner bisherigen Arbeiten."
    badges:
      - icon: "images"
        label: "Projektbilder"
      - icon: "hammer"
        label: "Arbeiten rund ums Haus"
      - icon: "search"
        label: "Mit Detailansicht"
  kontakt:
    kicker: "Kontakt"
    title: "Kontakt aufnehmen"
    text: "Sie haben ein Projekt oder eine Idee? Schreiben Sie mir einfach - ich melde mich zeitnah zurück."
    badges:
      - icon: "message-circle"
        label: "WhatsApp"
      - icon: "phone"
        label: "Telefon"
      - icon: "mail"
        label: "E-Mail"

services:
  - key: "innenausbau"
    url: "/innenausbau-renovierung/"
    title: "Innenausbau & Renovierung"
    icon: "hammer"
    teaser: "Ob neuer Boden oder eine komplette Raumrenovierung - ich unterstütze Sie bei der Umsetzung."
    items:
      - "Parkett verlegen"
      - "Vinylboden verlegen"
      - "Malerarbeiten"
      - "Renovierung einzelner Räume"
      - "Austausch von Leisten"
      - "Einbau von Türen"
    side_title: "Saubere Innenarbeiten"
    side_text: "Ich unterstütze bei einzelnen Räumen oder bei einer umfassenderen Auffrischung - mit klarer Abstimmung und ordentlicher Ausführung."
  - key: "bad"
    url: "/badsanierung-bauplanung/"
    title: "Badsanierung & Bauplanung"
    icon: "bath"
    teaser: "Von der ersten Idee bis zur Umsetzung begleite ich Ihr Projekt und sorge für eine saubere Ausführung."
    items:
      - "Planung von Bauprojekten"
      - "Badsanierung"
      - "Koordination verschiedener Arbeiten"
      - "Beratung zur Umsetzung"
    side_title: "Strukturiert geplant"
    side_text: "Gerade bei Bad- und Umbauprojekten ist eine klare Planung wichtig. Ich halte Abläufe übersichtlich und die Umsetzung nachvollziehbar."
  - key: "aussenbereich"
    url: "/aussenbereich-montage/"
    title: "Außenbereich & Montage"
    icon: "tree-pine"
    teaser: "Auch im Außenbereich übernehme ich viele Arbeiten rund ums Haus."
    items:
      - "Terrassensanierung"
      - "Balkonsanierung"
      - "Pflastern von Wegen"
      - "Austausch von Geländern"
      - "Montage von Vordächern"
      - "Einbau von Fenstern"
    side_title: "Rund ums Haus"
    side_text: "Auch außen zählt eine saubere Ausführung. Ich unterstütze bei Sanierung, Montage und praktischen Verbesserungen am Haus."
