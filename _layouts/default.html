<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'de' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta name="theme-color" content="#9BBA52" />
    <link rel="stylesheet" href="{{ '/assets/fonts/fonts.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/animate.min.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/cookie-dough/cookiebanner.style.css' | relative_url }}" />
  </head>
  <body>
    {% include navbar.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="{{ '/cookie-dough/cookiebanner.script.js' | relative_url }}"></script>
    <script>
      $(function () {
        cookieBanner.init();
      });
    </script>
  </body>
</html>
