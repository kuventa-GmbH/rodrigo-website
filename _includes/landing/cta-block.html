<section class="section{% if include.block.alt %} section-alt{% endif %}">
  <div class="container">
    {% assign booking_href = include.shared.booking_link | relative_url %}
    <div class="contact-booking__wrap center js-anim" data-anim="animate__fadeInUp" data-once="true">
      <h2 class="sec-heading">{{ include.block.title }}</h2>
      <p>{{ include.block.text }}</p>
      <a class="btn btn-primary" href="{{ booking_href }}">{{ include.shared.cta_text }}</a>
      <p>{{ include.shared.cta_note }}</p>
    </div>
  </div>
</section>
