{% assign project = include.project %}
<article class="gallery-card js-anim" data-anim="animate__fadeInUp" data-once="true" data-delay="{{ include.delay | default: 0 }}" data-gallery-project data-category="{{ project.category_slug }}">
  <a class="gallery-card__link" href="{{ project.url | relative_url }}" aria-label="{{ project.title }} ansehen">
    <div class="gallery-card__media">
      <img src="{{ project.cover_image | relative_url }}" alt="{{ project.cover_alt }}" loading="lazy">
      <div class="gallery-card__overlay">
        <p class="gallery-card__category">{{ project.category }}</p>
        <h2>{{ project.title }}</h2>
        <div class="gallery-card__meta">
          <span>
            <span data-lucide="hammer" aria-hidden="true"></span>
            <span>{{ project.category }}</span>
          </span>
          <span>
            <span data-lucide="image" aria-hidden="true"></span>
            <span>{{ project.image_count_label }}</span>
          </span>
        </div>
      </div>
    </div>
  </a>
</article>
